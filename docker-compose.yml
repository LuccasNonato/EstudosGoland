version: "3.9"

services:
  go_db:
    image: postgres:14
    container_name: go_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - go_db_data:/var/lib/postgresql/data

volumes:
  go_db_data:      